name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Submit to IndexNow
        run: |
          SITE_URL="https://theluckystrike.github.io/privacy-tools-guide"
          KEY="c4ded4558ba249bbbd828bbfd67ebe80"
          SITEMAP_URL="${SITE_URL}/sitemap.xml"

          # Fetch sitemap and extract URLs
          curl -s "$SITEMAP_URL" | grep -oP '(?<=<loc>)[^<]+' | head -10000 > /tmp/urls.txt
          URL_COUNT=$(wc -l < /tmp/urls.txt)

          if [ "$URL_COUNT" -eq 0 ]; then
            echo "No URLs found in sitemap"
            exit 0
          fi

          # Build JSON payload file (avoids argument list too long)
          jq -R -s --arg host "theluckystrike.github.io" --arg key "$KEY" --arg keyloc "${SITE_URL}/${KEY}.txt" \
            '{host: $host, key: $key, keyLocation: $keyloc, urlList: (split("\n") | map(select(length > 0)))}' \
            /tmp/urls.txt > /tmp/indexnow-payload.json

          # Submit to IndexNow using file-based payload
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d @/tmp/indexnow-payload.json)

          echo "Submitted $URL_COUNT URLs to IndexNow (HTTP $RESPONSE)"
