name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Submit URLs to IndexNow
        run: |
          SITE_URL="https://theluckystrike.github.io/privacy-tools-guide"
          KEY="c4ded4558ba249bbbd828bbfd67ebe80"
          SITEMAP_URL="${SITE_URL}/sitemap.xml"

          # Fetch sitemap and extract URLs
          URLS=$(curl -s "$SITEMAP_URL" | grep -oP '(?<=<loc>)[^<]+')
          URL_COUNT=$(echo "$URLS" | grep -c .)

          if [ "$URL_COUNT" -eq 0 ]; then
            echo "No URLs found in sitemap. Skipping IndexNow submission."
            exit 0
          fi

          # Build JSON payload with up to 10000 URLs
          URL_ARRAY=$(echo "$URLS" | head -10000 | jq -R -s 'split("\n") | map(select(length > 0))')

          # Submit to IndexNow
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"theluckystrike.github.io\",
              \"key\": \"${KEY}\",
              \"keyLocation\": \"${SITE_URL}/${KEY}.txt\",
              \"urlList\": ${URL_ARRAY}
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Submitted ${URL_COUNT} URLs to IndexNow (HTTP ${HTTP_CODE})"
